name: MemorySentryDemo
options:
  bundleIdPrefix: com.liuzeping.memorysentry.demo
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

packages:
  MemorySentry:
    # 本地 path 引用上级库包：Example/MemorySentryDemo → 库根是上两级。
    # 改库源码后 Xcode 会重新编译，可直接在 Demo 里调试库本身。
    path: ../..

targets:
  MemorySentryDemo:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: MemorySentry
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.liuzeping.memorysentry.demo
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
